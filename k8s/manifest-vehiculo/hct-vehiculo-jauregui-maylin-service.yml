# kubectl apply -f hct-vehiculo-jauregui-maylin-service.yml
apiVersion: v1
kind: Service
metadata:
  name: hct-vehiculo-jauregui-maylin-service
  namespace: hct-vehiculo-jauregui-maylin-namespace
spec:
  type: NodePort      #30000-32767  # Cambia a LoadBalancer si estás en un entorno de nube
  ports:
    - port: 8090        # Puerto que el Service expondrá
      targetPort: 8090  # Puerto en el contenedor donde tu aplicación escucha
      nodePort: 30001   # Puerto asignado en el nodo, opcional
  selector:
    app: hct-vehiculo-jauregui-maylin-deployment  # Debe coincidir con las etiquetas del Deployment