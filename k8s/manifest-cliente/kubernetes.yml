# MINIKUBE FUNCIONA EN CODESPACE | LOCAL
# KUBECTL FUNCIONA DIRECTO EN KILLERCODA (SIN MINIKUBE)

# consultar versión de minikube
minikube version

# consultar si minikube esta en start o stop
minikube status

# iniciar clúster kubernetes
minikube start

# ingresar a la carpeta de los manifiestos de kubernetes (manifest-cliente)
cd manifest-cliente

# listar namespace
kubectl get namespace
kubectl get ns

# crear un namespace "hct-cliente-jauregui-maylin-namespace" por comando mediante un archivo: "hct-cliente-jauregui-maylin-namespace.yml"
kubectl apply -f hct-cliente-jauregui-maylin-namespace.yml

# consultar namespace en uso por "default" | LINUX
kubectl config view --minify | grep namespace

# consultar namespace en uso por "default" | WINDOWS
kubectl config view --minify | findstr namespace

# cambiar un namespace en uso por "default" a "hct-cliente-jauregui-maylin-namespace"
kubectl config set-context --current --namespace=hct-cliente-jauregui-maylin-namespace

# consultar todos los recursos de un namespace "hct-cliente-jauregui-maylin-namespace"
kubectl get all -n hct-cliente-jauregui-maylin-namespace

# consultar todos los recursos y secret de un namespace "hct-cliente-jauregui-maylin-namespace"
kubectl get all,secrets -n hct-cliente-jauregui-maylin-namespace

# listar services del namespace "hct-cliente-jauregui-maylin-namespace"
minikube service hct-cliente-jauregui-maylin-service -n hct-cliente-jauregui-maylin-namespace
minikube service list

# Ver los Pods
kubectl get pods -n hct-cliente-jauregui-maylin-namespace

# Ver todos los recursos
kubectl get all -n hct-cliente-jauregui-maylin-namespace

# probar el microservicio dentro del clúster con curl
curl http://192.168.49.2:30002/v1/api/cliente

# crear un túnel de puerto la máquina local (host) y el clúster de Kubernetes
kubectl port-forward service/hct-cliente-jauregui-maylin-service 8090:30002

#Creaciones
kubectl apply -f hct-cliente-jauregui-maylin-namespace.yml
kubectl apply -f hct-cliente-jauregui-maylin-secret.yml
kubectl apply -f hct-cliente-jauregui-maylin-deployment.yml
kubectl apply -f hct-cliente-jauregui-maylin-service.yml
